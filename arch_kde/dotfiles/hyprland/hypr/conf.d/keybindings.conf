###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER

# Paths
$HYPRSCRIPTS = $HOME/.config/hypr/scripts

# Core app and launcher binds
bind = $mainMod, RETURN, exec, $terminal --class big_float
bind = $mainMod, D, exec, $menu
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, period, exec, $HYPRSCRIPTS/launcher-emoji.sh
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, O, exec, obsidian
bind = $mainMod SHIFT, X, exec, $terminal --class big_float -e btop
bind = $mainMod SHIFT, D, exec, discord

# Alt-Tab is managed by hyprshell via ~/.config/hyprshell/config.toml.
# Defining manual Alt-Tab binds here conflicts with hyprshell's own switch mode.

# Hyprspace overview
bind = $mainMod, Tab, overview:toggle

# Utility app binds
bind = $mainMod CTRL, B, exec, sh -c 'bluetoothctl show | grep -q "Powered: yes" && bluetoothctl power off || bluetoothctl power on'
bind = $mainMod CTRL SHIFT, B, exec, sh -c 'command -v blueman-manager >/dev/null 2>&1 && blueman-manager || bluetoothctl devices'
bind = $mainMod SHIFT CTRL, V, exec, pavucontrol --class small_float
bind = $mainMod CTRL, W, exec, $terminal --class small_float -e nmtui
bind = $mainMod, V, exec, $terminal --class small_float -e clipse
bind = $mainMod CTRL, P, exec, hyprpicker -a
bind = $mainMod, N, exec, swaync-client -t -swa
bind = $mainMod SHIFT, B, exec, $HYPRSCRIPTS/waybar.sh
bind = $mainMod ALT, B, exec, pkill -x waybar

# Window/session management
bind = $mainMod, Q, killactive,
bind = $mainMod, C, centerwindow
bind = $mainMod, T, togglefloating,
bind = $mainMod, F11, fullscreen, 0
bind = $mainMod, F, exec, sh -c 'hyprctl activewindow -j | grep -q "\"floating\": true" || hyprctl dispatch togglefloating; hyprctl dispatch resizeactive exact $float_size_small; hyprctl dispatch centerwindow'
bind = $mainMod SHIFT, F, exec, sh -c 'hyprctl activewindow -j | grep -q "\"floating\": true" || hyprctl dispatch togglefloating; hyprctl dispatch resizeactive exact $float_size_large; hyprctl dispatch centerwindow'
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, P, pseudo,
bind = $mainMod, G, togglegroup
bind = ALT CTRL, right, changegroupactive, f
bind = ALT CTRL, left, changegroupactive, b
bind = $mainMod, L, exec, sh -c 'command -v hyprlock >/dev/null 2>&1 && hyprlock || loginctl lock-session'
bind = $mainMod CTRL, Q, exec, command -v wlogout >/dev/null 2>&1 && wlogout || hyprctl dispatch exit

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Resize active window
bind = $mainMod SHIFT, right, resizeactive, 100 0
bind = $mainMod SHIFT, left, resizeactive, -100 0
bind = $mainMod SHIFT, up, resizeactive, 0 -100
bind = $mainMod SHIFT, down, resizeactive, 0 100

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod, M, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1
bind = $mainMod CTRL, left, workspace, e-1
bind = $mainMod CTRL, right, workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots
bind = $mainMod SHIFT, S, exec, hyprshot -z -m region
bind = $mainMod SHIFT, A, exec, hyprshot -z -m output
bind = $mainMod SHIFT, W, exec, hyprshot -z -m window
bind = $mainMod SHIFT, E, exec, sh -c 'grim -g "$(slurp)" - | swappy -f -'

# Laptop multimedia keys for volume and LCD brightness
binde = ,XF86AudioRaiseVolume, exec, $HYPRSCRIPTS/volume.sh 5%+
binde = ,XF86AudioLowerVolume, exec, $HYPRSCRIPTS/volume.sh 5%-
bind = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && $HYPRSCRIPTS/notify-progress.sh "Volume" 998 "$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{printf \"%.0f\", $2 * 100}')" &
bind = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && notify-send -h "string:x-canonical-private-synchronous:mic" -t 1000 -r 997 "Microphone" "$(wpctl get-volume @DEFAULT_AUDIO_SOURCE@ | grep -q MUTED && echo 'Muted' || echo 'Unmuted')" &
binde = ,XF86MonBrightnessUp, exec, $HYPRSCRIPTS/brightness.sh +
binde = ,XF86MonBrightnessDown, exec, $HYPRSCRIPTS/brightness.sh -
binde = ,XF86BrightnessUp, exec, $HYPRSCRIPTS/brightness.sh +
binde = ,XF86BrightnessDown, exec, $HYPRSCRIPTS/brightness.sh -

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioStop, exec, playerctl stop
bindl = , XF86AudioRewind, exec, playerctl position 5-
bindl = , XF86AudioForward, exec, playerctl position 5+
bindl = , XF86Bluetooth, exec, sh -c 'bluetoothctl show | grep -q "Powered: yes" && bluetoothctl power off || bluetoothctl power on'
bindl = , XF86PowerOff, exec, $HYPRSCRIPTS/launcher-power.sh

# Wallpaper Picker
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpicker.sh

# Keybindings Cheatsheet
bind = $mainMod SHIFT, slash, exec, $terminal --class small_float -e ~/.config/hypr/scripts/keybindings_cheatsheet.ndsh

# Theme Toggle
bind = $mainMod ALT, T, exec, $HYPRSCRIPTS/theme-toggle.sh
