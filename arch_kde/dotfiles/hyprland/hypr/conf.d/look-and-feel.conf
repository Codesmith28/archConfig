#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 50
        render_power = 30
        color = 0x66000000
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = false
        xray = false

        vibrancy = 0.22
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = true

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = windows, 1, 2.0, overshot, popin 60%
    animation = border, 1, 6.5, md3_standard
    animation = fade, 1, 1.9, fluent_decel
    animation = workspaces, 1, 2.3, easeOutCirc, slide
    animation = specialWorkspace, 1, 1.5, md3_standard, slidevert
}

# Layer blur rules (Hyprland side) for bars, launchers, and notifications.
layerrule = blur on, match:namespace ^(waybar)$
layerrule = blur_popups on, match:namespace ^(waybar)$
layerrule = ignore_alpha 0.2, match:namespace ^(waybar)$

layerrule = blur on, match:namespace ^(rofi)$
layerrule = ignore_alpha 0.2, match:namespace ^(rofi)$

layerrule = blur on, match:namespace ^(wlogout)$
layerrule = ignore_alpha 0.2, match:namespace ^(wlogout)$

layerrule = blur on, match:namespace ^(swaync-control-center)$
layerrule = blur_popups on, match:namespace ^(swaync-control-center)$
layerrule = ignore_alpha 0.2, match:namespace ^(swaync-control-center)$
layerrule = blur on, match:namespace ^(swaync-notification-window)$
layerrule = ignore_alpha 0.2, match:namespace ^(swaync-notification-window)$

