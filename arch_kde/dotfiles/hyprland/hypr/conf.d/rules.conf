##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Float helper window classes used by keybindings
windowrule {
    name = big-float
    match:class = ^(big_float)$
    float = yes
    size = $float_size_large
    center = yes
}

windowrule {
    name = small-float
    match:class = ^(small_float)$
    float = yes
    size = $float_size_small
    center = yes
}

# Utility/transient apps: open floating and centered
windowrule {
    name = blueman-manager
    match:class = ^(blueman-manager)$
    float = yes
    size = 700 500
    center = yes
}

windowrule {
    name = pavucontrol
    match:class = ^(pavucontrol)$
    float = yes
    size = 700 500
    center = yes
}

windowrule {
    name = qalculate-gtk
    match:class = ^(qalculate-gtk)$
    float = yes
    size = 700 500
    center = yes
}

# Common file dialogs and quick prompts
windowrule {
    name = common-file-dialogs
    match:title = ^(Open File|Open Files|Open Folder|All Files|Save As|File Upload|Authentication Required|Choose Files)(.*)$
    float = yes
    size = 900 650
    center = yes
}

# Default terminal windows: open as large float
windowrule {
    name = kitty-big-float
    match:class = ^(kitty)$
    float = yes
    size = $float_size_large
    center = yes
}

