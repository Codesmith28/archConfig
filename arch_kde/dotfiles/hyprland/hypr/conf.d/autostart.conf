#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

exec-once = ~/.config/hypr/scripts/waybar.sh
exec-once = sh -c 'command -v swaync >/dev/null 2>&1 && swaync'
exec-once = sh -c 'command -v hyprshell >/dev/null 2>&1 && hyprshell run'
exec-once = sh -c 'if command -v hyprpaper >/dev/null 2>&1 && [ -f ~/.config/hypr/hyprpaper.conf ]; then hyprpaper; elif command -v swaybg >/dev/null 2>&1; then swaybg -c 1e1e2e; fi'
exec-once = sh -c 'command -v clipse >/dev/null 2>&1 && clipse -listen'
exec-once = sh -c 'if [ -x /usr/lib/polkit-kde-authentication-agent-1 ]; then /usr/lib/polkit-kde-authentication-agent-1; elif [ -x /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 ]; then /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1; fi'
exec-once = hyprpaper

# Start the KDE Wallet daemon
exec-once = /usr/lib/pam_kwallet_init
exec-once = kwalletd6
exec-once = /usr/lib/polkit-kde-authentication-agent-1