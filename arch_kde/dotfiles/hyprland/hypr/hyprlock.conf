# FANCIEST HYPRLOCK CONFIGURATION
# Created for maximum aesthetics with glassmorphic cards and dynamic live blur

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# BACKGROUND
background {
    monitor =
    path = screenshot
    # Live blur of whatever is currently on screen
    blur_passes = 3
    blur_size = 8
    
    # Dimming background for cinematic effect
    brightness = 0.4
    contrast = 0.9
    noise = 0.0117
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# PROFILE PICTURE (Top Centered)
image {
    monitor =
    path = $HOME/.cache/profile/profile.png
    size = 220
    rounding = -1
    border_size = 3
    border_color = rgba(255, 255, 255, 0.9)
    rotate = 0
    reload_time = -1
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 3
}

# USERNAME
label {
    monitor =
    text = codesmith
    color = rgba(255, 255, 255, 0.9)
    font_size = 32
    font_family =   Monospace
    position = 0, 30
    halign = center
    valign = center
    shadow_passes = 2
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.25 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.25 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1
    inner_color = rgba(0, 0, 0, 0.3)
    outer_color = rgba(255, 255, 255, 0.2)
    font_color = rgb(255, 255, 255)
    font_family =   Monospace
    fade_on_empty = false
    placeholder_text = <span foreground="##ffffff99">🔒 Enter Password</span>
    hide_input = false
    rounding = 25
    check_color = rgba(137, 180, 250, 0.6)
    fail_color = rgba(243, 139, 168, 0.6)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -40
    halign = center
    valign = center
    shadow_passes = 2
}

# TIME (Bottom Right)
label {
    monitor =
    text = cmd[update:1000] echo "<b><span foreground='##ffffff'>$(date +"%H")</span><span foreground='##89b4fa'>:</span><span foreground='##ffffff'>$(date +"%M")</span></b>"
    color = rgba(255, 255, 255, 1.0)
    font_size = 80
    font_family =   Monospace
    position = -50, 80
    halign = right
    valign = bottom
    shadow_passes = 4
    shadow_size = 5
}

# DATE (Bottom Right)
label {
    monitor =
    text = cmd[update:1000] echo "<b><span foreground='##ffffff'>$(date +"%A")</span><span foreground='##b4befe'>, </span><span foreground='##ffffff'>$(date +"%d %B")</span></b>"
    color = rgba(255, 255, 255, 0.85)
    font_size = 20
    font_family =   Monospace
    position = -50, 45
    halign = right
    valign = bottom
    shadow_passes = 3
    shadow_size = 4
}